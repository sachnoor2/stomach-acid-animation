name: Render Video
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Create package.json
        run: |
          echo '{"dependencies": {"remotion": "4.0.0", "react": "18.0.0", "react-dom": "18.0.0", "@remotion/cli": "4.0.0", "lucide-react": "0.284.0"}}' > package.json

      - name: Install Dependencies
        run: npm install

      - name: Download Assets
        run: |
          mkdir -p public
          mkdir -p src
          curl -L -o public/audio.mp3 https://share.zapia.com/kx0nx0uuc6dz1bbhr5371i
          curl -L -o src/StomachAcid_VIRAL.tsx https://share.zapia.com/j8rm6urw29jbvf07v2piui

      - name: Fix Root.tsx
        run: |
          echo "import React from 'react'; import { Composition } from 'remotion'; import { StomachAcidViral } from './StomachAcid_VIRAL'; export const RemotionRoot: React.FC = () => { return ( <Composition id='StomachAcid' component={StomachAcidViral} durationInFrames={2400} fps={60} width={1080} height={1920} /> ); };" > src/Root.tsx

      - name: Render Video
        run: npx remotion render StomachAcid out/video.mp4 --overwrite

      - name: Upload Video
        uses: actions/upload-artifact@v3
        with:
          name: video
          path: out/video.mp4
