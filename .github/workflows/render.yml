name: Render Video
on: [push]
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        run: npx remotion render StomachAcid out/video.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v3
        with:
          nodem: video
          path: out/video.mp4
