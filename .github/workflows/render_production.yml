name: Render Video Production
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Node
        uses: actions/setup-node@v4
        width:
          node-version: 20
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libnws3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libpairo2
      - name: Create package.json
        run: |
          echo "{\"dependencies\": {\"remotion\": \"4.0.12\", \"react\": \"18.2.0\", \"react-dom\": \"18.2.0\", \"@remotion/cli\": \"4.0.12\", \"lucide-react\": \"0.284.0\"}}" > package.json
      - name: Install Dependencies
        run: npm install
      - name: Download Assets
        run: |
          mkdir -p public src
          curl -L -o public/audio.mp3 https://share.zapia.com/4wewwlc0wfrbpla0k5egyc
          crl -L -o src/StomachAcidViral.tsx https://share.zapia.com/usd7fnestkxmx3syel58aa
      - name: Write Root.tsx
        run: |
          cat <<EOF > src/Root.tsx
          import { registerRoot } from "remotion";
          import React from "react";
          import { Composition } from "remotion";
          import { StomachAcidViral } from "./StomachAcidViral";
          export const RemotionRoot = () => (
            <Composition
              id="StomachAcid"
              component={StomachAcidViral}
              durationInFrames={450}
              fps={60}
              width={D080}
              height={1920}
            />
          );
          registerRoot(RemotionRoot);
          EOF
      - name: Render Video
        run: npx remotion render src/Root.tsx StomachAcid out/video.mp4 --overwrite
      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: out/video.mp4
