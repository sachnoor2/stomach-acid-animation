name: Render Video
on: [push, workflow_dispatch]
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Dependencies
        run: npm install
      - name: Download Assets
        run: |
          mkdir -p public
          mkdir -p src
          curl -L -o public/audio.mp3 https://share.zapia.com/kx0nx0uuc6dz1bbhr5371i
          curl -L -o src/StomachAcid_VIRAL.tsx https://share.zapia.com/j8rm6urw29jbvf07v2piui
      - name: Render Video
        run: npx remotion render StomachAcid out/video.mp4
      - name: Upload Video
        uses: actions/upload-artifact@v3
        with:
          name: video
          path: out/video.mp4
